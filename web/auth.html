<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 / 注册 - LLM PDF OCR</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="hero">
          <h1>账号</h1>
          <p>登录或注册后可使用任务功能。</p>
        </div>
        <div class="top-auth">
          <a class="link-btn" href="/">返回首页</a>
          <div id="auth-user" class="auth-inline hidden">
            <span id="auth-user-email" class="value"></span>
            <button id="logout-button">登出</button>
          </div>
        </div>
      </header>

      <section class="card">
        <h2>登录 / 注册</h2>
        <div class="auth-form">
          <label class="label" for="auth-email">邮箱</label>
          <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-form">
          <label class="label" for="auth-password">密码</label>
          <input
            id="auth-password"
            type="password"
            placeholder="至少 8 位"
            autocomplete="current-password"
          />
        </div>
        <div class="auth-actions">
          <button id="register-button">注册</button>
          <button id="login-button" class="primary">登录</button>
        </div>
        <p id="auth-message" class="hint"></p>
      </section>
    </main>

    <script type="module" src="dist/auth.js"></script>
  </body>
</html>
