<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM PDF OCR</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="hero">
          <h1>LLM PDF OCR</h1>
          <p>上传 PDF，生成 Markdown。</p>
        </div>
        <div class="top-auth">
          <a id="auth-link" class="link-btn" href="/auth">登录 / 注册</a>
          <div id="auth-user" class="auth-inline hidden">
            <span id="auth-user-email" class="value"></span>
            <button id="logout-button">登出</button>
          </div>
        </div>
      </header>

      <section class="card tip-card">
        <h2>使用提示</h2>
        <p id="auth-benefit-text" class="hint strong">
          游客模式不保存历史任务记录。登录 / 注册后可获得更高额度（单次最多 40 页）并使用历史任务等额外功能。
        </p>
      </section>

      <section class="card">
        <h2>上传 PDF</h2>
        <div id="upload-zone" class="upload-zone">
          <p>拖拽 PDF 到这里，或点击选择文件</p>
          <button id="select-button" class="primary">选择 PDF</button>
          <input id="file-input" type="file" accept="application/pdf" hidden />
        </div>
        <p id="upload-hint" class="hint">仅支持 PDF 格式。</p>
      </section>

      <section class="card">
        <h2>当前任务</h2>
        <div class="status-row">
          <span class="label">Task ID</span>
          <span id="task-id" class="value">-</span>
        </div>
        <div class="status-row">
          <span class="label">状态</span>
          <span id="task-status" class="value">未开始</span>
        </div>
        <div class="status-row">
          <span class="label">进度</span>
          <span id="task-progress" class="value">-</span>
        </div>
        <a id="result-link" class="link hidden" href="#" download>下载结果</a>
        <p id="status-message" class="hint"></p>
      </section>

      <section id="history-card" class="card hidden">
        <div class="history-head">
          <h2>历史任务</h2>
          <button id="history-refresh-button" type="button">刷新</button>
        </div>
        <p id="history-hint" class="hint">仅登录用户可查看历史任务。</p>
        <ul id="history-list" class="history-list"></ul>
      </section>

      <section class="card">
        <h2>任务查询</h2>
        <div class="query">
          <input id="query-input" type="text" placeholder="输入 Task ID" />
          <button id="query-button">查询</button>
        </div>
        <p id="query-message" class="hint"></p>
      </section>
    </main>

    <script type="module" src="dist/main.js"></script>
  </body>
</html>
